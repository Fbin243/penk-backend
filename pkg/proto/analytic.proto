syntax = "proto3";  

package pb;

option go_package = "/pb";

service Analytic {
    rpc DeleteCapturedRecords(DeleteCapturedRecordsReq) returns (DeleteCapturedRecordsResp) {}
}

message DeleteCapturedRecordsReq {
    string profileID = 1;
}

message DeleteCapturedRecordsResp {
    bool success = 1;
}

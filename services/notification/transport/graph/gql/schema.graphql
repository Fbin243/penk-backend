type Query {
  getReminders: [Reminder!]!
  getReminder(id: ID!): Reminder!
}

type Mutation {
  addToWaitlist(email: String!): Boolean!
  registerDeviceToken(token: String!, profileID: String!, deviceID: String!, platform: String!): Boolean!
  removeDeviceToken(token: String!, profileID: String!, deviceID: String!): Boolean!

  createReminder(input: ReminderInput!): Reminder!
  updateReminder(id: ID!, input: ReminderInput!): Reminder!
  deleteReminder(id: ID!): Boolean!
}

scalar Time

type Reminder {
    id: ID!
    createdAt: Time!
    updatedAt: Time!
    profileID: ID!
    type: ReminderType!
    title: String!
    remindTime: Time!
    recurrence: String!
    linkedItemID: ID!
}

input ReminderInput {
    type: ReminderType!
    title: String!
    remindTime: Time!
    recurrence: String!
    linkedItemID: ID!
}

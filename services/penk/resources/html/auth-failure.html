    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary400: #2fc8b8;
        --error50: #fef2f2;
        --error400: #ff4949;
        --neutral50: #ffffff;
        --neutral500: #3e3e3e;
        --neutral300: #7f7f7f;
        --bg: #f9fafb;
        --radius: 12px;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      body {
        font-family: "Roboto", sans-serif;
        margin: 0.5rem;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #ffffff 0%, var(--error50) 100%);

        color: var(--neutral500);
        line-height: 1.5;
        text-wrap-style: balance;
      }

      .container {
        text-align: center;
        background-color: var(--neutral50);
        padding: 2.5rem;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        width: 90%;
        max-width: 400px;
        margin: 2rem 0;
      }

      .logo {
        height: 50px;
        margin-bottom: 0.2rem;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--neutral500);
        margin: 1rem 0 0.5rem;
        line-height: 1.3;
      }

      p {
        font-size: 1.05rem;
        font-weight: 500;
        color: var(--neutral300);
        margin: 0.5rem 0 0.5rem;
      }

      .failure-animation {
        position: relative;
        margin: 2.5rem auto;
        width: 80px;
        height: 80px;
      }

      .crossmark {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: block;
        stroke-width: 3;
        stroke: var(--neutral50);
        stroke-miterlimit: 10;
        animation: fill 0.5s ease-in-out 0.5s forwards, scale 0.4s ease-in-out 0.8s both;
      }

      .crossmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 3;
        stroke-miterlimit: 10;
        stroke: var(--error400);
        fill: none;
        animation: stroke 0.7s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }

      .crossmark__cross {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.7s forwards;
      }

      .additional-info p {
        font-size: 1rem;
        color: var(--neutral300);
        margin: 0.7rem 0 0.5rem;
        font-weight: 500;
      }

      .additional-info a {
        color: var(--primary400);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .additional-info a:hover {
        color: var(--primary400);
        text-decoration: underline;
      }

      @keyframes stroke {
        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes scale {
        0%,
        100% {
          transform: none;
        }

        50% {
          transform: scale3d(1.1, 1.1, 1);
        }
      }

      @keyframes fill {
        100% {
          box-shadow: inset 0 0 0 100vh var(--error400);
        }
      }

      @media (max-width: 430px) {
        .container {
          padding: 1.75rem;
          margin: 2rem 1rem;
        }

        h1 {
          font-size: 1.5rem;
        }

        p {
          font-size: 1rem;
        }

        .failure-animation {
          width: 70px;
          height: 70px;
        }
      }
    </style>
  </head>

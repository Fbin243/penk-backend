type Query {
  context: Context
  messages: [Message!]!
}

type Mutation {
  upsertContext(input: ContextInput!): Context!
}

type Message {
  type: MessageType!
  content: String!
  timestamp: String!
}

enum MessageType {
  USER_MESSAGE
  AI_MESSAGE
}

type Context {
  timezone: String!
  locale: String!
  personality: String!
  context: String!
}

input ContextInput {
  timezone: String!
  locale: String!
  personality: String!
  context: String!
}

# WS Types
type WS_Message {
  type: WS_MessageType!
  content: String!
  timestamp: String!
}

type WS_TextChatInput {
  content: String!
}

enum WS_MessageType {
  AUTH
  INFO
  TEXT_CHAT
  AUDIO_CHAT
}

enum WS_InfoType {
  AUTHENTICATION_SUCCESS
  AUTHENTICATION_FAILED
  AUTHENTICATION_REQUIRED
  AUTHENTICATION_TIMEOUT
  MESSAGE_STREAM_COMPLETED
}

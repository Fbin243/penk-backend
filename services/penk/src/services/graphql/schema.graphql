type Query {
  context: Context
  messages: [Message!]!
}

type Mutation {
  upsertContext(input: ContextInput!): Context!
  chat(input: ChatInput!): ChatOutput!
}

type Message {
  type: MessageType!
  content: String!
  timestamp: String!
}

enum MessageType {
  USER_MESSAGE
  AI_MESSAGE
}

type Context {
  timezone: String!
  locale: String!
  personality: String!
  context: String!
}

type ChatOutput {
  message: Message!
  audio: String
}

input ContextInput {
  timezone: String!
  locale: String!
  personality: String!
  context: String!
}

input ChatInput {
  content: String!
  voiceMode: Boolean
}

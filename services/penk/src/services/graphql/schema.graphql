type Query {
  context: Context
  messages: [Message!]!
}

type Mutation {
  upsertContext(input: ContextInput!): Context!
  chat(content: String!): Message!
}

type Message {
  type: MessageType!
  content: String!
  timestamp: String!
}

enum MessageType {
  USER_MESSAGE
  AI_MESSAGE
}

type Context {
  timezone: String!
  locale: String!
  tone: String!
  context: String!
}

input ContextInput {
  timezone: String!
  locale: String!
  tone: String!
  context: String!
}

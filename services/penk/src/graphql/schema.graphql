type Query {
  userContext: UserContext!
  messages: [Message!]!
}

type Mutation {
  chat(content: String!): Message!
}

type UserContext {
  id: ID!
  profileID: ID!
  timezone: String!
  locale: String!
  preferences: Preferences!
  context: String!
}

type Preferences {
  tone: String!
}

type Message {
  type: MessageType!
  content: String!
  timestamp: String!
}

enum MessageType {
  USER_MESSAGE
  AI_MESSAGE
  AI_ERROR
}

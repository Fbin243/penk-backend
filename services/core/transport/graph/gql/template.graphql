type Template {
  id: ID!
  createdAt: Time!
  updatedAt: Time!
  name: String!
  description: String!
  topic: TemplateTopic
  categories: [TemplateCategory!]!
}

type TemplateCategory {
  name: String!
  description: String!
  style: CategoryStyle!
  metrics: [TemplateMetric!]!
}

type TemplateMetric {
  name: String!
  value: Float!
  unit: String!
}

type TemplateTopic {
  id: ID!
  name: String!
  description: String!
}
type Habit {
  id: ID!
  createdAt: Time!
  updatedAt: Time!
  characterID: ID!
  categoryID: ID
  category: Category
  completionType: CompletionType
  name: String!
  value: Float!
  unit: String
  rrule: String
}

enum CompletionType {
  Number
  Time
}

input HabitInput {
  id: ID
  categoryID: ID
  completionType: CompletionType!
  name: String!
  value: Float!
  unit: String
  rrule: String!
}
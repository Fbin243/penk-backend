type Category {
  id: ID!
  characterID: ID!
  name: String!
  description: String!
  style: CategoryStyle!
  time: Int!
  metricCount: Int!
}

type CategoryStyle {
  color: String!
  icon: String!
}

input CategoryInput {
  id: ID
  characterID: ID!
  name: String!
  description: String
  style: CategoryStyleInput!
}

input CategoryStyleInput {
  color: String!
  icon: String!
}
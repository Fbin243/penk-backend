type Goal {
  id: ID!
  createdAt: Time
  updatedAt: Time
  characterID: ID!
  name: String!
  description: String!
  startTime: Time!
  endTime: Time!
  status: GoalStatus!
  metrics: [GoalMetric!]!
  checkboxes: [Checkbox!]!
}

type GoalMetric {
  id: ID!
  metric: Metric!
  condition: MetricCondition!
  targetValue: Float
  rangeValue: Range
}

type Range {
  min: Float!
  max: Float!
}

type Checkbox {
  id: ID!
  name: String!
  value: Boolean!
}

# Inputs
input GoalInput {
  id: ID
  characterID: ID!
  name: String!
  description: String
  startTime: Time!
  endTime: Time!
  metrics: [GoalMetricInput!]
  checkboxes: [CheckboxInput!]
}

input GoalMetricInput {
  id: ID!
  condition: MetricCondition!
  targetValue: Float
  rangeValue: RangeInput
}

input RangeInput {
  min: Float!
  max: Float!
}

input CheckboxInput {
  id: ID
  name: String!
  value: Boolean!
}

enum MetricCondition {
  lt
  lte
  eq
  gte
  gt
  ir
}

enum GoalStatus {
  InProgress
  Planned
  Completed
  Overdue
}
type Goal {
  id: ID!
  createdAt: Time!
  updatedAt: Time!
  characterID: ID!
  name: String!
  description: String!
  startDate: Time!
  endDate: Time!
  status: GoalFinishStatus!
  target: [Category!]
}

enum GoalFinishStatus {
  Unfinished
  Finished
}

input GoalInput {
  id: ID
  name: String!
  description: String
  startDate: Time!
  endDate: Time!
  target: [GoalCategoryInput!]
}

input GoalCategoryInput {
  id: ID!
  metrics: [GoalMetricInput!]
}

input GoalMetricInput {
  id: ID!
  value: Float!
}

input GoalStatusFilter {  
  finishStatus: GoalFinishStatus 
  expireStatus: GoalExpireStatus
}

enum GoalExpireStatus {
  Expired
  Unexpired
}
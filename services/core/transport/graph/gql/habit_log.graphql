type HabitLog {
  id: ID!
  timestamp: Time!
  habitID: ID!
  value: Float!
}

input HabitLogInput {
  timestamp: Time!
  habitID: ID!
  value: Float!
}

input HabitLogFilter {
  habitID: ID
  startTime: Time
  endTime: Time
}

input HabitLogOrderBy {
  timestamp: SortOrder
}

enum SortOrder {
  ASC
  DESC
}